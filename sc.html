const idx = {};
Object.entries(DADOS).forEach(([c,l]) => l.forEach(x => {
  if (x.id) idx[c+"|"+x.id] = x;
}));
const map = L.map("map").setView([-27.860, -48.560], 10);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  attribution:"© OpenStreetMap", maxZoom:19
}).addTo(map);
const marcadores = L.layerGroup().addTo(map);
function trocarCidade() {
  const cidade = document.getElementById("cidade").value;
  marcadores.clearLayers();
  if (!cidade) return;
  const ctos = DADOS[cidade] || [];
  ctos.forEach(c => {
    if (!c.id) return;
    const url = "https://www.google.com/maps/search/?api=1&query=" + c.lat + "," + c.lng;
    L.circleMarker([c.lat,c.lng],{radius:6,color:"#1e8fff",fillOpacity:0.8})
     .addTo(marcadores)
     .bindPopup("<b>CTO "+c.id+"</b><br>"+c.name+"<br><a href='"+url+"' target='_blank' style='color:#22dd88;font-weight:bold'>Abrir no Google Maps</a>");
  });
  if (ctos.length > 0) {
    map.setView([ctos[0].lat, ctos[0].lng], 13);
  }
}
function buscar() {
  const cidade = document.getElementById("cidade").value;
  const v = document.getElementById("busca").value.trim();
  if (!cidade) { alert("Selecione uma cidade primeiro!"); return; }
  if (!v) { alert("Digite o numero da CTO!"); return; }
  const c = idx[cidade+"|"+v];
  if (c) { map.flyTo([c.lat,c.lng],17); }
  else { alert("CTO "+v+" nao encontrada em "+cidade+"!"); }
}
document.getElementById("busca").addEventListener("keypress", e => {
  if (e.key==="Enter") buscar();
});
